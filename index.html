<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Info Printer</title>

<style>
    body { font-family: Arial, sans-serif; padding: 20px; text-align: center; }

    input {
        padding: 8px;
        width: 220px;
        margin: 5px;
        font-size:16px;
    }

    button { padding: 8px 15px; font-size:16px; margin-top:10px; }

    .print-container {
        width: 700px;
        margin: 20px auto;
        padding: 20px;
        border: 2px solid #333;
        border-radius: 10px;
        text-align: left;
    }

    h1 { text-align: center; margin-bottom: 10px; }

    .section { padding: 10px; margin-bottom: 15px; }

    .section h3 { margin-top:0; color: #0056b3; }

    hr { border:0; height:1px; background:#aaa; margin:15px 0; }

    .warning {
        background: #fff3cd;
        border: 1px solid #ffeeba;
        padding: 20px;
        border-radius: 8px;
        color: #856404;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div style="text-align:center; margin-bottom:20px;">
    <img src="https://ocmt.odoo.com/web/image/14023-206f05ff/ltuc_logo_en_colored.webp" style="width:400px;">
</div>

<h2>Student Credentials Generator</h2>

<input type="text" id="studentNumber" placeholder="Student Number (8 digits)">
<input type="text" id="studentName" placeholder="Student Name">
<input type="password" id="studentPassword" placeholder="Password">

<br>
<button onclick="showInfo()">Show</button>

<div id="printArea" style="display:none; margin-top:20px;">
    <button onclick="printContent()">Print</button>
    <div id="content" class="print-container"></div>
</div>


<script>
function showInfo() {

    const studentNumber = document.getElementById('studentNumber').value.trim();
    const studentName = document.getElementById('studentName').value.trim();
    const password = document.getElementById('studentPassword').value.trim();
    const container = document.getElementById('content');

    if (!studentNumber || !studentName || !password) {
        alert("Please fill all fields!");
        return;
    }

    if (!/^\d{8}$/.test(studentNumber)) {
        alert("Student number must be exactly 8 digits!");
        return;
    }

    // OLD student number
    if (parseInt(studentNumber, 10) <= 1000000) {
        container.innerHTML = `
            <div class="warning">
                Application designed for new students.<br><br>
                Please contact IT Team.
            </div>
        `;
        document.getElementById('printArea').style.display = "block";
        return;
    }

    // NEW students
    container.innerHTML = `
<div style="text-align:center; margin-bottom:20px;">
    <img src="https://ocmt.odoo.com/web/image/14023-206f05ff/ltuc_logo_en_colored.webp" style="width:450px;">
</div>

<h1>Student Account & Portal Credentials</h1>

<p><strong>Student Name:</strong> ${studentName}</p>
<p><strong>Student Number:</strong> ${studentNumber}</p>

<hr>

<div class="section">
    <h3>University Email Account</h3>
    <p>• Email: <strong>${studentNumber}@std.ltuc.edu.jo</strong></p>
    <p>• Password: <strong>${password}</strong></p>
</div>

<hr>

<div class="section">
    <h3>Student Portal</h3>
    <p>• URL: https://portal.ltuc.edu.jo/LTUC/sso.web/</p>
    <p>• Username: <strong>${studentNumber}</strong></p>
    <p>• Password: <strong>${password}</strong></p>
</div>

<hr>

<div class="section">
    <h3>Moodle</h3>
    <p>https://lms.ltuc.edu.jo/</p>
    <p>Use your University Email & Password</p>
</div>

<p><strong>Best regards,</strong><br>LTUC IT / E-Learning Team</p>
`;

    document.getElementById('printArea').style.display = "block";
}

function printContent() {
    const content = document.getElementById('content').innerHTML;
    const printWindow = window.open('', '', 'height=800,width=900');
    printWindow.document.write('<html><head><title>Print</title></head><body>');
    printWindow.document.write(content);
    printWindow.document.write('</body></html>');
    printWindow.document.close();
    printWindow.print();
}
</script>

</body>
</html>
